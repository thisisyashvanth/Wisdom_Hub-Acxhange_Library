  </a>

  <div class="employee-nav__links">
    <a class="employee-nav__link" routerLink="/employee-dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Dashboard
    </a>
    <a class="employee-nav__link" routerLink="/get-all-books" routerLinkActive="active">

    </a>
